# Model capability matrix — the SINGLE SOURCE OF TRUTH for per-sdk / per-model
# reasoning, thinking, and sampler behavior.
#
# Compiled into BOTH:
#   * the Rust daemon  — `core/config/src/capabilities.rs` via `include_str!`
#   * the TS sidecar   — `backend/llm-sidecar/src/llm/capabilities.ts` via a
#                        `.toml` import that `bun build` inlines into the bundle.
#
# It is therefore NOT runtime- or user-editable: edit this file and rebuild.
# Each consumer reads the slice it needs (Rust: domain + sampler_rule +
# model_override; TS: fold, budget, gemini levels, thinking_rule +
# model_override). Keep both green via the cross-language
# parity fixtures in capabilities.rs tests and the sidecar `*_adapter.test.ts`.

# ── reasoning_effort: accepted value set + wire mapping, per sdk ──────────────
# `domain`  — accepted values (Rust validates `shore model setting` against it).
# `fold`    — named effort → the value actually sent (unlisted = passthrough).
# `budget`  — effort → budget_tokens for Anthropic "enabled" thinking mode.

[reasoning_effort.anthropic]
domain = ["adaptive", "low", "medium", "high", "xhigh", "max"]
budget = { low = 4096, medium = 8192, high = 12288, xhigh = 16384, max = 24576 }

# OpenAI / OpenRouter `reasoning.effort` accept none|minimal|low|medium|high|xhigh.
# `xhigh` is the real ceiling — passed through, NOT folded. `max` is intentionally
# absent: it is an Anthropic-only effort, so it is not a valid option here.
[reasoning_effort.openai]
domain = ["minimal", "low", "medium", "high", "xhigh"]

[reasoning_effort.openrouter]
domain = ["minimal", "low", "medium", "high", "xhigh"]

[reasoning_effort.gemini]
# Gemini maps each accepted effort to a thinkingLevel of the same name.
domain = ["minimal", "low", "medium", "high"]

[reasoning_effort.zai]
# Z.AI ignores reasoning_effort (thinking is driven by zai_clear_thinking).
domain = []

# ── Per-model capability overrides ───────────────────────────────────────────
# A model-id dimension on top of the per-sdk matrix, for the OpenRouter
# passthrough case (issue #164): the `openrouter` sdk fronts many different
# underlying vendors (Gemini, Kimi, GPT, xAI, GLM, DeepSeek…) that do NOT share
# one capability surface, so a single sdk default over-/under-reports per vendor.
#
# Each entry is keyed by `match` — a case-insensitive substring of the model_id.
# OpenRouter ids carry a `vendor/` prefix (`google/`, `moonshotai/`, `x-ai/`,
# `openai/o…`) that appears nowhere else, so plain substring matching scopes
# these to the OR passthrough without an sdk filter. The two surfaces that
# actually vary by underlying vendor (verified against Shore's OR adapter
# `buildCall`, which only sends reasoning.effort + temperature/top_p + routing):
#
#   reasoning_effort — accepted value set (overrides the sdk default `domain`).
#                      First match whose `reasoning_effort` is present wins.
#   rejects_sampling — the underlying model 400s/ignores temperature/top_p.
#                      First match whose `rejects_sampling` is present wins; OR'd
#                      with the Claude >=4.7 cutoff in `applicability`.
#
# The two fields are looked up independently, so an effort-only and a
# sampling-only entry never interfere. Order specific-before-generic. Add an
# entry only with a provider-doc reason — `budget_tokens`/`cache_ttl` are never
# sent on the OR path, so they need no per-vendor override (uniformly Ignored).
#   [[model_override]]
#   match            = "some-model-id"
#   reasoning_effort = ["minimal", "low", "medium", "high"]
#   rejects_sampling = true

# Gemini 3.x Pro exposes thinkingLevel low|medium|high only; `minimal` is a
# Flash / Flash-Lite / Flash-Image level (it is in fact their default), so the
# sdk default (which keeps `minimal` for the Flash tier) over-reports for Pro.
# The match is Pro-specific on purpose: a bare "gemini-3.1" substring would also
# strip `minimal` from `gemini-3.1-flash-image-preview`, which supports it.
# Verified against the Gemini 3 developer guide:
# https://ai.google.dev/gemini-api/docs/gemini-3 (issue #166). Matches the
# native Gemini id (`google/gemini-3.1-pro-preview`) and the OR-routed one.
[[model_override]]
match            = "gemini-3.1-pro"
reasoning_effort = ["low", "medium", "high"]

# OR-routed Gemini (`google/gemini-*`): thinkingLevel is minimal|low|medium|high
# — no `xhigh`. The generic `openrouter` sdk default DOES include `xhigh`, so it
# over-reports here. The Pro override above is listed first and wins for Pro ids;
# this catches the Flash tier (which keeps `minimal`). Gemini 3 developer guide.
[[model_override]]
match            = "google/gemini"
reasoning_effort = ["minimal", "low", "medium", "high"]

# OR-routed xAI Grok (`x-ai/grok-*`): reasoning_effort is an enum
# none|low|medium|high (`none` disables — surfaced via Shore's separate "off"
# sentinel, not a domain value) — no `minimal`, no `xhigh`, which OpenRouter
# would just fold to the nearest enum value. https://docs.x.ai (reasoning).
[[model_override]]
match            = "x-ai/grok"
reasoning_effort = ["low", "medium", "high"]

# OR-routed OpenAI o-series (`openai/o1|o3|o4…`) are reasoning-only models that
# reject sampler knobs (temperature/top_p) upstream. GPT-5 is intentionally NOT
# listed: it supports temperature (distinct from the o-series — cf. litellm
# #16246). OpenAI API docs; cf. LibreChat #10737.
[[model_override]]
match            = "openai/o1"
rejects_sampling = true
[[model_override]]
match            = "openai/o3"
rejects_sampling = true
[[model_override]]
match            = "openai/o4"
rejects_sampling = true

# NOTE: the no-tier / budget-mapped OpenRouter vendors — `moonshotai/kimi-*`,
# `deepseek/*`, `z-ai/*` (GLM), `minimax/*` — are deliberately left on the
# generic OpenRouter effort set. Their reasoning is an enable/disable toggle
# (not a graded enum), so OpenRouter maps a requested effort to a reasoning-token
# BUDGET ratio (minimal≈0.1 … xhigh≈0.95) rather than a fixed level — every value
# produces distinct behavior, so the full set is meaningful. This matches the
# provider-doc audit in CONFIGURATION.md (issue #166), which lists e.g.
# `kimi-k2.6` as "thinking on/off, no tiers (OR maps)". Only true enum-effort
# vendors (Gemini thinkingLevel, Grok reasoning_effort) get a narrowed override.

# ── Claude version rules ─────────────────────────────────────────────────────
# A shared parser yields {family, major, minor} from a Claude model id (handling
# `claude-opus-4-8`, `claude-opus-4.8`, family-after-version `claude-3-opus`, an
# optional `<gateway>/` prefix, and a trailing `YYYYMMDD` date that must NOT be
# read as the minor). Non-Claude ids yield nothing and match no rule.
#
# Each rule is matched top-to-bottom, first match wins, else the `default_*`
# below. A rule matches when EVERY present condition holds:
#   contains   — case-insensitive substring of the id
#   family     — pipe-separated set, e.g. "opus|sonnet"
#   min_major/min_minor — inclusive lower bound (missing minor → 0)
#   max_major/max_minor — inclusive upper bound (missing minor → unbounded)
#
# Two independent lists: the thinking-mode and sampler-rejection cutoffs do NOT
# share boundaries (e.g. Sonnet 4.7 rejects sampling but is thinking-permissive;
# Opus 5.x is thinking-permissive but rejects sampling).

[claude]
default_adaptive = true
default_enabled = true
default_rejects_sampling = false

# adaptive-vs-enabled thinking mode (Anthropic buildThinkingParams).
[[claude.thinking_rule]]
contains = "mythos"
adaptive = true
enabled = false
[[claude.thinking_rule]]
# Opus 4.7..4.x — adaptive-only.
family = "opus"
min_major = 4
min_minor = 7
max_major = 4
adaptive = true
enabled = false
[[claude.thinking_rule]]
# Opus 4.5 / Sonnet 4.5 — enabled-only.
family = "opus|sonnet"
min_major = 4
min_minor = 5
max_major = 4
max_minor = 5
adaptive = false
enabled = true
[[claude.thinking_rule]]
# Haiku (any version) — enabled-only.
family = "haiku"
adaptive = false
enabled = true
[[claude.thinking_rule]]
# Claude 3.x and earlier — enabled-only.
max_major = 3
adaptive = false
enabled = true

# sampler rejection (temperature / top_p / budget_tokens 400 on these).
[[claude.sampler_rule]]
# Opus/Sonnet 4.7 and later (including 5.x) reject sampler knobs.
family = "opus|sonnet"
min_major = 4
min_minor = 7
rejects_sampling = true
