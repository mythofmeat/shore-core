# git-cliff configuration. Drives auto-generated release notes published to
# GitHub Releases by .github/workflows/package.yml on each `v*` tag push.
#
# CHANGELOG.md in the repo is a frozen historical record up to v0.15.0; for
# v0.16.0 onward the canonical release notes live in Gitea Releases.

[changelog]
header = ""
body = """
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}**: {% endif %}{{ commit.message | upper_first }}
{%- endfor %}
{% endfor %}
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = true
filter_commits = true
# Anchored with ^/$ so per-crate tags like `shore-config-v0.3.0` (which contain
# `v0.3.0` as a substring) don't accidentally match. Without anchors, git-cliff
# `--latest` was picking the most recent release-plz library tag as the
# previous release boundary, producing empty notes for v* tag releases.
tag_pattern = "^v[0-9]+\\.[0-9]+\\.[0-9]+$"
sort_commits = "oldest"

commit_parsers = [
    { message = "^feat",     group = "Added" },
    { message = "^fix",      group = "Fixed" },
    { message = "^refactor", group = "Changed" },
    { message = "^perf",     group = "Changed" },
    { message = "^revert",   group = "Changed" },
    { message = "^docs",     skip  = true },
    { message = "^chore",    skip  = true },
    { message = "^test",     skip  = true },
    { message = "^ci",       skip  = true },
    { message = "^build",    skip  = true },
    { message = "^style",    skip  = true },
]
