# Shore V2 — Example Configuration
# All values shown are defaults unless noted otherwise.
#
# Models are configured inline under [chat.<provider>.<model>].
# You can also split config with `include = ["extra.toml"]` or conf.d/*.toml.

# include = ["models.toml"]   # Optional explicit includes
                               # conf.d/*.toml is also auto-loaded

# ── Daemon ───────────────────────────────────────────────────────────────

# [daemon]
# addr = "127.0.0.1:7320"       # Default listen address
# unsafe_allow_remote_access = false  # Required for non-loopback binds
# allowed_hosts = []                  # IP allowlist only; not auth/TLS

# ── Defaults ─────────────────────────────────────────────────────────────

[defaults]
model = "claude-sonnet"            # Chat default; also fallback for background tasks
# embedding = "text-large"          # Embedding profile
# image_generation = "gemini-flash" # Image generation profile
# display_name = "Your Name"        # {{user}} in templates; falls back to $USER
# stream = true

# Optional: split chat from background tasks (heartbeat/compaction/dreaming).
# - Set only `defaults.model` above for one model everywhere.
# - Set `[defaults.background] model` to send all background work to a different
#   model (the most common split — two fields total).
# - Per-task keys override `background.model` for that one task.
# [defaults.background]
# model = "claude-haiku"
# heartbeat = "claude-haiku"
# compaction = "claude-sonnet"
# dreaming = "claude-sonnet"

# ── Autonomy ─────────────────────────────────────────────────────────────
# Controls the character's autonomous behavior — what makes it feel present
# and real. Disabled by default; enable to allow unprompted messages.

# [behavior.autonomy]
# enabled = false

# Heartbeat — autonomous "private moment" ticks where the character can reflect,
# use tools (memory, web search, etc.), and optionally send an unprompted message.
# [behavior.autonomy.heartbeat]
# enabled = true
# fallback_heartbeat_interval = "1h"      # Base cadence when the character doesn't self-schedule
# dormant_after_heartbeat_turns = 3       # Consecutive ticks with no user reply before sleeping
# dormant_after_idle_time = "48h"           # Hard idle ceiling before sleeping until user returns
# minimum_heartbeat_latency = "1h"        # Floor between a user message and the next tick
# max_tool_rounds = 12                      # Tool-use rounds per tick

# Dreaming — opt-in scheduled memory consolidation. Requires
# [behavior.autonomy].enabled = true, but does not require heartbeat.
# [memory.dreaming]
# enabled = false
# frequency = "0 3 * * *"
# max_tool_rounds = 12
# Optional: set [defaults.background].dreaming to choose a specific model.

# ── Tool use ─────────────────────────────────────────────────────────────

# [behavior.tool_use]
# enabled = true
# max_iterations = 10  # Max tool-call rounds per turn before forcing a final response

# Per-tool toggles — all enabled by default; set to false to disable.
# [behavior.tool_use.tools]
# memory = true              # Enables memory/... workspace access and history search
# memory_read = true         # Allows read/list/search of memory/... and search_history
# memory_write = true        # Allows write/edit of memory/... files
# generate_image = true
# web_search = true
# fetch_url = true
# check_time = true
# roll_dice = true
# activity_heatmap = true
# read = true                # Read workspace files; memory=false blocks memory/... access
# write = true               # Write workspace files; protected character files defer to compaction
# edit = true                # Edit workspace files
# list_files = true          # List workspace files
# search = true              # Search workspace files; memory=false hides memory/... results
# search_history = true      # Search compacted and active conversation history
# exec = true                # Allowlisted, argument-sandboxed workspace commands;
#                            # hidden when memory read/write is disabled or private

# [behavior.tool_use.search]
# api_key_env = "TAVILY_API_KEY"  # Env var holding the Tavily API key
# max_results = 5
# search_depth = "basic"          # "basic" or "advanced"
# include_answer = true           # Include Tavily's synthesized answer

# ── Memory & context management ──────────────────────────────────────────

# Compaction — trims the active conversation when it grows too long.
# [memory.compaction]
# enabled = true
# idle_trigger = "30m"       # Trigger after this much inactivity
# min_turns = 8              # Don't compact below this many user turns
# max_turns = 16             # Force compaction when this many user turns is reached
# max_context_tokens = 200000 # Force compaction when the last turn's prompt context
#                            # (input + cache_read + cache_creation) reaches this
#                            # many tokens. Default 200000 is a context-window
#                            # safety net. Set ~30000 to optimise for cost on
#                            # Opus 4.7 (cost-curve elbow). 0 disables entirely.
# keep_recent_turns = 2      # User turns to retain verbatim after compaction

# Retrieval — controls semantic/lexical ranking for internal memory retrieval.
# "auto" uses hybrid semantic+lexical search when an embedder is resolved and
# usable, otherwise lexical search.
# [memory.retrieval]
# mode = "auto"              # "auto", "lexical", or "hybrid"

# Thinking — controls how extended-thinking blocks from prior turns are
# handled when building outgoing API requests.
# [memory.thinking]
# preserve_prior_turns = true   # default: keep prior-turn thinking blocks.
#                               # Set false to strip and save tokens — safe
#                               # for Anthropic Claude 4.x. DeepSeek V3.1+
#                               # and Moonshot Kimi-thinking ignore the
#                               # strip and always replay reasoning_content.

# ── Notifications ────────────────────────────────────────────────────────

# [notifications]
# enabled = false
# backend = "notify_send"  # "notify_send", "ntfy", or "command"

# [notifications.ntfy]
# url = "https://ntfy.sh"
# topic = ""
# token = ""  # Optional auth token for self-hosted instances

# [notifications.command]
# template = ""  # Shell command; use {title} and {body} as placeholders

# generation_threshold = "0s"  # Only notify message_complete when generation exceeds this (0 = always)

# [notifications.events]
# autonomous_message = true
# cache_warning = true
# compaction_complete = true
# error = true
# message_complete = false  # Notify when message generation completes

# ── Connections ──────────────────────────────────────────────────────────

# ── Matrix: External mode (connect to an existing homeserver) ─────────────
# [connections.matrix]
# enabled = true
# homeserver = "https://matrix.example.com"
# user_id = "@shore:example.com"
# room_id = "!abc123:example.com"
# trusted_user = "@user:example.com"

# ── Matrix: Embedded mode (shore-matrix manages a local homeserver) ───────
# Uses a conduwuit-compatible server (continuwuity, conduwuit, or tuwunel).
# [connections.matrix]
# trusted_user = "@user:shore.local"
#
# [connections.matrix.embedded]
# server_name = "shore.local"          # Cannot be changed after first run. Default: "localhost"
# admin_password = "your-admin-pass"   # Required
# port = 6167
# admin_user = "shore-admin"
# # bind_address = "127.0.0.1"         # Default: loopback only. Use "0.0.0.0" for
#                                      # all interfaces, or a specific LAN/Tailscale
#                                      # IP to expose the homeserver to other devices.
# # data_dir = "..."                   # Default: $XDG_DATA_HOME/shore/matrix-server/
# # binary = "continuwuity"            # Default: auto-detect

# ── Telegram (reserved for future use) ───────────────────────────────────
# [connections.telegram]

# ── Discord (reserved for future use) ────────────────────────────────────
# [connections.discord]

# ── Services ─────────────────────────────────────────────────────────────
# Supervised helper processes that the daemon manages.
# Currently only [services.llm] is used (reserved for an external LLM proxy).

# [services.llm]
# command = "node shore-llm/dist/index.js"  # Command to spawn the LLM service
# socket = "/run/shore-llm.sock"            # Unix socket the service listens on

# ── Advanced ─────────────────────────────────────────────────────────────

# [advanced]
# api_payload_logging = false
# cache_forensics = false          # Write prompt-cache diagnostics to cache_forensics.jsonl when debugging cache behavior
# editor = "nvim"                   # Override $VISUAL / $EDITOR
# max_retries = 2
# retry_backoff = "500ms"           # Base delay; doubles on each retry
# max_image_size = 2000000          # Resize images above this size (bytes) before LLM upload; 0 = disable
# Data directory: override via $XDG_DATA_HOME (default: ~/.local/share/shore)

# ── Chat models ──────────────────────────────────────────────────────────
# Provider-level settings cascade into all models under that provider.
# Model-level values take precedence over provider-level values.
#
# Known providers with hardcoded defaults:
#   anthropic  — sdk: anthropic, api_key_env: ANTHROPIC_API_KEY,  temp: 1.0, max_tokens: 8192, max_context: 200000
#   openrouter — sdk: openai,     api_key_env: OPENROUTER_API_KEY, temp: 1.0, max_tokens: 8192, max_context: 200000
#   deepseek   — sdk: deepseek,   api_key_env: DEEPSEEK_API_KEY,   temp: 1.0, max_tokens: 8192, max_context: 200000
#   gemini     — sdk: gemini,     api_key_env: GEMINI_API_KEY,     temp: 1.0, max_tokens: 8192, max_context: 200000
#   xai        — sdk: openai,     api_key_env: XAI_API_KEY,        temp: 1.0, max_tokens: 8192, max_context: 200000
#   zhipuai    — sdk: zhipuai,    api_key_env: ZAI_API_KEY,        temp: 1.0, max_tokens: 8192, max_context: 200000
#   zai        — sdk: zai,       api_key_env: ZAI_API_KEY,        temp: 1.0, max_tokens: 8192, max_context: 200000
#   nanogpt    — sdk: openai,    api_key_env: NANOGPT_API_KEY,    temp: 1.0, max_tokens: 8192, max_context: 200000
#
# Available fields (provider- or model-level):
#
#   — Auth & connection —
#   sdk = "anthropic"                        # Wire protocol: anthropic, openai, gemini, deepseek, zhipuai, zai
#   api_key_env = "MY_API_KEY"               # Env var holding the API key
#   base_url = "https://..."                 # Override the API base URL
#   keepalive_enabled = false                # Keep the HTTP connection alive between requests
#
#   — Sampling —
#   max_context_tokens = 200000              # Context window size
#   max_tokens = 8192                        # Maximum output tokens
#   temperature = 1.0
#   top_p = 1.0
#
#   — Reasoning / thinking —
#   reasoning_effort = "high"               # Anthropic: "low"|"medium"|"high"|"max" (adaptive) or "adaptive"; OpenAI/DeepSeek: "low"|"medium"|"high"
#   budget_tokens = 8192                    # Thinking token budget — Anthropic (legacy), Gemini
#
#   — Prompt caching (Anthropic) —
#   cache_ttl = "5m"                        # e.g. "5m", "1h"
#   keepalive_enabled = true                # Send periodic pings to keep the cache alive (cost-saving)
#   keepalive_ttl = "5m"                   # Derive ping interval from TTL (default: 4 min)
#   keepalive_max_pings = 15               # Stop after this many pings to avoid runaway cost
#
#   — Provider-specific —
#   openrouter_provider = {order = ["anthropic"]}  # OpenRouter provider routing hints
#   vertex_project = "my-gcp-project"       # GCP project for Vertex AI
#   vertex_location = "us-central1"         # GCP region for Vertex AI
#   gemini_generation = 2
#   gemini_web_search = false               # Enable Gemini's built-in web search
#   zai_clear_thinking = false              # false = preserve reasoning across turns (Z.AI)
#   zai_subscription = false                # true = use Z.AI coding subscription endpoint

[chat.anthropic.claude-sonnet]
model_id = "claude-sonnet-4-6"

# [chat.anthropic.claude-opus]
# model_id = "claude-opus-4-6"
# max_tokens = 16384

# [chat.openai.gpt-4o]
# model_id = "gpt-4o"

# [chat.gemini.gemini-pro]
# model_id = "gemini-2.5-pro"

# [chat.zai.glm-5]
# model_id = "glm-5"
# zai_clear_thinking = false    # Preserve reasoning across turns
# zai_subscription = false      # Set true to use the coding subscription endpoint

# [chat.nanogpt.claude-opus]
# model_id = "anthropic/claude-opus-4.6"   # NanoGPT uses provider/model format

# ── Provider registry & discovery ────────────────────────────────────────
# Optional. A `[providers.<name>]` block configures a provider once
# (sdk + base_url + ordered keys + /v1/models discovery) so you don't have
# to define every model inline. Manual `[chat.<provider>.<alias>]` entries
# above keep working alongside discovered models — they win on conflict
# and are never hidden by `discovery.ignore` rules.
#
# Use `shore provider` and `shore model` to inspect, refresh, and switch.

# ── Single-key form (compact) ────────────────────────────────────────────
# [providers.openai]
# api_key_env = "OPENAI_API_KEY"

# ── Multiple keys with budget/overflow rotation ──────────────────────────
# Keys are tried in configured order on every request. When the daemon
# falls back away from a key marked `warn_on_fallback = true` (e.g. your
# capped budget key), a one-line warning surfaces in the client.
# [providers.openrouter]
# enabled = true
# sdk = "openai"
# base_url = "https://openrouter.ai/api/v1"
#
# [[providers.openrouter.keys]]
# name = "budget"
# env = "OPENROUTER_API_KEY_BUDGET"
# warn_on_fallback = true
#
# [[providers.openrouter.keys]]
# name = "overflow"
# env = "OPENROUTER_API_KEY_OVERFLOW"
#
# [providers.openrouter.discovery]
# enabled = true
# # Gitignore-style; last match wins. `*` opt-out, `!pattern` opt-in.
# # Hidden discovered models stay in the cache but are filtered from
# # `shore model` and `shore provider models <name>` until `--all`
# # (CLI) / `:model all` (TUI) is used.
# ignore = [
#   "*",
#   "!anthropic/*",
#   "!openai/*",
#   "!google/gemini-*",
# ]

# ── Manual alias for the default model ───────────────────────────────────
# [defaults].model must reference a static `[chat.*.*]` alias, so define
# one even when discovery is enabled. The alias's overrides (cache_ttl,
# temperature, ...) win over both discovered metadata and saved sampler
# preferences for that (provider, model_id).
# [chat.openrouter.sonnet]
# model_id = "anthropic/claude-sonnet-4.5"
# cache_ttl = "1h"
# max_tokens = 16384

# ── Thinking / reasoning ─────────────────────────────────────────────────
#
# Anthropic (Opus 4.6, Sonnet 4.6) — reasoning_effort (recommended):
#   reasoning_effort = "adaptive"  model decides whether/how much to think
#   reasoning_effort = "high"      always think, deep reasoning (default effort)
#   reasoning_effort = "medium"    moderate thinking, may skip for simple queries
#   reasoning_effort = "low"       minimal thinking
#   reasoning_effort = "max"       deepest reasoning, Opus 4.6 only
#
# Anthropic (legacy / older models) — budget_tokens:
#   budget_tokens = 8192           explicit thinking token budget
#
# OpenAI / DeepSeek — reasoning_effort:
#   reasoning_effort = "high"      "low" | "medium" | "high"
#
# Gemini — budget_tokens:
#   budget_tokens = 8192           thinking token budget
#
# Z.AI (GLM-5) — thinking enabled by default:
#   zai_clear_thinking = false     preserve reasoning across turns (default)
#   zai_clear_thinking = true      strip reasoning from prior turns (cheaper)
#
# Examples:
#
# [chat.anthropic.claude-opus-thinking]
# model_id = "claude-opus-4-6"
# max_tokens = 16384
# reasoning_effort = "high"
#
# [chat.anthropic.claude-sonnet-adaptive]
# model_id = "claude-sonnet-4-6"
# max_tokens = 16384
# reasoning_effort = "adaptive"
#
# [chat.openai.o3]
# model_id = "o3"
# reasoning_effort = "high"
#
# [chat.deepseek.deepseek-r1]
# model_id = "deepseek-reasoner"
# reasoning_effort = "high"
#
# [chat.gemini.gemini-pro-thinking]
# model_id = "gemini-2.5-pro"
# budget_tokens = 8192
#
# [chat.zai.glm-5-thinking]
# model_id = "glm-5"
# zai_clear_thinking = false

