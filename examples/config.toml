# Shore — Example Configuration
#
# All values shown are defaults unless noted otherwise. Most sections are
# commented out; uncomment only what you want to override.
#
# Models are identified by `provider:model_id`. Configure a provider's
# transport once under [providers.<name>], then reference any of its models
# as `provider:model_id` (e.g. [defaults].model below). Provider-wide
# behavioral defaults go under [providers.<name>.defaults]; per-model
# overrides under [models."<provider>:<model_id>"].
#
# Split config across files with `include = ["models.toml"]`, or drop extra
# `*.toml` into a `conf.d/` next to this file (auto-loaded).
#
# The old inline [chat.<provider>.<model>] / [tools.<provider>.<model>]
# catalog is deprecated and intentionally omitted from this example. See
# CONFIGURATION.md for migrating any leftover entries.

# include = ["models.toml"]   # Optional explicit includes (conf.d/*.toml also auto-loads)

# ── Daemon ───────────────────────────────────────────────────────────────

# [daemon]
# addr = "127.0.0.1:7320"             # Default listen address
# unsafe_allow_remote_access = false  # Required for any non-loopback bind
# allowed_hosts = []                  # Source-IP allowlist only; NOT auth or TLS

# ── Defaults ─────────────────────────────────────────────────────────────

[defaults]
model = "anthropic:claude-sonnet-4-6"   # Chat default as provider:model_id; also the final fallback for background tasks
# embedding = "openai:text-embedding-3-large"           # Embedding model (provider:model_id)
# image_generation = "openai:dall-e-3"                  # Image model (provider:model_id)
# display_name = "Ren"                # {{user}} in templates; falls back to $USER
# stream = true

# Optional: route background work (heartbeat/compaction/dreaming) to a
# different, usually cheaper model. When omitted, background tasks follow the
# character's current chat model.
# - Set background.model for one blanket background model.
# - Per-task keys override background.model for that task only.
# [defaults.background]
# model = "anthropic:claude-haiku-4-5"
# heartbeat = "anthropic:claude-haiku-4-5"
# compaction = "anthropic:claude-sonnet-4-6"
# dreaming = "anthropic:claude-sonnet-4-6"

# ── Providers & models ───────────────────────────────────────────────────
# A [providers.<name>] block is the single home for transport — sdk, base_url,
# and ordered API keys. Reference any model it serves as `provider:model_id`.
#
# Known provider keys carry hardcoded transport defaults, so an empty block
# (or just an api_key_env override) registers them:
#
#   key         sdk         api_key_env          base_url (default)
#   ─────────   ─────────   ──────────────────   ─────────────────────────────────
#   anthropic   anthropic   ANTHROPIC_API_KEY    https://api.anthropic.com
#   openai      openai      OPENAI_API_KEY       https://api.openai.com/v1
#   openrouter  openrouter  OPENROUTER_API_KEY   https://openrouter.ai/api/v1
#   gemini      gemini      GEMINI_API_KEY       (native Google API)
#   deepseek    deepseek    DEEPSEEK_API_KEY     https://api.deepseek.com
#   moonshot    moonshot    MOONSHOT_API_KEY     https://api.moonshot.ai/v1
#   zai         zai         ZAI_API_KEY          https://api.z.ai/api/paas/v4
#   xai         openai      XAI_API_KEY          https://api.x.ai/v1
#   zhipuai     openai      ZAI_API_KEY          https://open.bigmodel.cn/api/paas/v4
#   nanogpt     openai      NANOGPT_API_KEY      https://nano-gpt.com/api/v1
#
# All hardcoded providers default to temperature 1.0, max_output_tokens 8192,
# max_context_tokens 200000. Any other OpenAI-compatible endpoint works as a
# custom provider — set sdk = "openai" plus base_url and api_key_env.
#
# Behavioral / vendor fields (valid under [providers.*.defaults] or
# [models."provider:model_id"]):
#
#   — Sampling —
#   max_context_tokens = 200000   # Context window
#   max_output_tokens  = 8192     # Max output tokens
#   temperature        = 1.0
#   top_p              = 1.0
#
#   — Reasoning / thinking —  (accepted set is capability-checked per model)
#   reasoning_effort = "high"
#     anthropic         low|medium|high|xhigh|max  (+ "adaptive", "off")
#     openai/openrouter minimal|low|medium|high|xhigh   ("max" is Anthropic-only)
#     gemini            minimal|low|medium|high    ("minimal" is Flash-only on 3.x Pro)
#     deepseek (native) low|medium|high|xhigh|max
#     moonshot (native) thinking on/off, driven by budget_tokens
#     zai (GLM)         thinking on/off only — no effort tiers
#   budget_tokens = 8192          # Gemini thinkingBudget / native Moonshot thinking budget
#
#   — Prompt caching (Anthropic) —
#   cache_ttl          = "5m"     # e.g. "5m", "1h"
#   keepalive_enabled  = true     # Periodic pings keep the prompt cache warm
#   keepalive_ttl      = "5m"     # Derive ping interval from TTL (default ~4m)
#   keepalive_max_pings = 15      # Stop after N pings to cap runaway cost
#
#   — Vendor knobs (resolve model > sdk > provider) —
#   openrouter_provider = { order = ["anthropic"] }  # OpenRouter routing hints
#   vertex_project   = "my-gcp-project"
#   vertex_location  = "us-central1"
#   gemini_generation = 2
#   gemini_web_search = false     # Gemini built-in Google Search grounding
#   zai_clear_thinking = false    # false = preserve cross-turn reasoning (Z.AI default)
#   zai_subscription   = false    # true = use the Z.AI coding-plan endpoint

# Anthropic has hardcoded transport, so an empty block registers it.
[providers.anthropic]
# api_key_env = "ANTHROPIC_API_KEY"   # Override the hardcoded default if needed

# Provider-wide behavioral defaults applied to every anthropic model (optional):
# [providers.anthropic.defaults]
# cache_ttl = "1h"
# max_output_tokens = 16384

# Per-model override, keyed by the canonical provider:model_id (optional):
# [models."anthropic:claude-sonnet-4-6"]
# reasoning_effort = "high"

# Opus 4.7/4.8 think in adaptive-only mode: temperature/top_p and budget_tokens
# are rejected; use reasoning_effort instead.
# [models."anthropic:claude-opus-4-8"]
# reasoning_effort = "adaptive"   # model decides whether/how much to think
# max_output_tokens = 16384

# ── Multi-key rotation + discovery (OpenRouter example) ───────────────────
# Keys are tried in configured order on every request. When the daemon falls
# back away from a key marked warn_on_fallback = true (e.g. an exhausted budget
# cap), a one-line warning surfaces in the client.
# [providers.openrouter]
# enabled = true
# sdk = "openrouter"
# base_url = "https://openrouter.ai/api/v1"
#
# [[providers.openrouter.keys]]
# name = "budget"
# env = "OPENROUTER_API_KEY_BUDGET"
# warn_on_fallback = true
#
# [[providers.openrouter.keys]]
# name = "overflow"
# env = "OPENROUTER_API_KEY_OVERFLOW"
#
# Discovery lists everything the provider advertises via GET <base_url>/models.
# ignore is gitignore-style: last match wins, `*` opts out, `!pattern` opts in.
# Hidden models stay cached but are filtered from `shore model` until `--all`.
# [providers.openrouter.discovery]
# enabled = true
# ignore = [
#   "*",
#   "!anthropic/*",
#   "!openai/*",
#   "!google/gemini-*",
# ]
#
# Provider-wide defaults (transport stays on the entry above; sdk/base_url/keys
# are rejected here):
# [providers.openrouter.defaults]
# max_output_tokens = 8192
# openrouter_provider = { order = ["anthropic"] }   # routing pin for anthropic/*
#
# Reference a discovered/trusted model directly — no catalog entry needed:
#   [defaults] model = "openrouter:anthropic/claude-sonnet-4.5"
# [models."openrouter:anthropic/claude-sonnet-4.5"]
# temperature = 0.8

# ── Z.AI (GLM) ───────────────────────────────────────────────────────────
# Hardcoded transport (sdk = "zai", ZAI_API_KEY, base_url above), so an empty
# block registers it. GLM thinking is on/off only — there are no effort tiers.
# [providers.zai]
# [providers.zai.defaults]
# zai_clear_thinking = false   # preserve reasoning across turns (default)
# zai_subscription   = false   # true = GLM coding-plan endpoint (.../api/coding/paas/v4)
#
# [models."zai:glm-5.1"]
# zai_clear_thinking = true    # strip prior-turn reasoning (cheaper)

# ── Native DeepSeek / Moonshot (Kimi) ─────────────────────────────────────
# These hit api.deepseek.com / api.moonshot.ai directly (not via OpenRouter)
# with native reasoning control.
# [providers.deepseek]
# [models."deepseek:deepseek-reasoner"]
# reasoning_effort = "high"    # low|medium|high|xhigh|max; "off" disables thinking
#
# [providers.moonshot]
# [models."moonshot:kimi-k2-thinking"]
# budget_tokens = 8192         # native Moonshot thinking budget

# ── Autonomy ─────────────────────────────────────────────────────────────
# Controls the character's autonomous behavior. Disabled by default; enable
# to allow unprompted messages.

# [behavior.autonomy]
# enabled = false

# Heartbeat — autonomous "private moment" ticks where the character can reflect,
# use tools (memory, web search, etc.), and optionally send an unprompted message.
# [behavior.autonomy.heartbeat]
# enabled = true
# fallback_heartbeat_interval = "1h"      # Base cadence when the character doesn't self-schedule
# dormant_after_heartbeat_turns = 3       # Consecutive ticks with no user reply before sleeping
# dormant_after_idle_time = "48h"         # Hard idle ceiling before sleeping until the user returns
# minimum_heartbeat_latency = "1h"        # Floor between a user message and the next tick
# max_tool_rounds = 12                    # Tool-use rounds per tick
# wrap_up_grace_rounds = 3                # Extra rounds granted after the wrap-up nudge

# Dreaming — opt-in scheduled memory consolidation. Requires
# [behavior.autonomy].enabled = true, but does not require heartbeat.
# [memory.dreaming]
# enabled = false
# frequency = "0 3 * * *"                 # Five-field cron; e.g. "0 6 * * 1" = Mondays 06:00
# max_tool_rounds = 12
# Optionally pin a model via [defaults.background].dreaming.

# ── Tool use ─────────────────────────────────────────────────────────────

# [behavior.tool_use]
# enabled = true
# max_iterations = 10        # Max tool-call rounds per turn before forcing a final response
# max_result_chars = 20000   # Truncate each tool result past this many characters (0 disables)

# Per-tool toggles — all enabled by default; set to false to disable.
# [behavior.tool_use.tools]
# web_search = true
# fetch_url = true
# generate_image = true
# check_time = true
# roll_dice = true
# activity_heatmap = true
# read = true                # Read workspace files (memory/ is an ordinary subdir)
# write = true               # Write workspace files; protected prompt files defer to compaction
# edit = true
# list_files = true
# search = true              # Search workspace files
# delete = true
# search_history = true      # Search compacted + active conversation history (hidden in private convos)
# exec = true                # Allowlisted, argument-sandboxed workspace commands (hidden in private convos)

# [behavior.tool_use.search]
# api_key_env = "TAVILY_API_KEY"  # Env var holding the Tavily API key
# max_results = 5
# search_depth = "basic"          # "basic" or "advanced"
# include_answer = true           # Include Tavily's synthesized answer

# ── Memory & context management ──────────────────────────────────────────

# Compaction — trims the active conversation when it grows too long.
# [memory.compaction]
# enabled = true
# idle_trigger = "30m"        # Trigger after this much inactivity
# min_turns = 8               # Don't compact below this many user turns
# max_turns = 16              # Force compaction at this many user turns
# max_context_tokens = 200000 # Force compaction when last-turn prompt context reaches this
#                             # (200000 is a context-window safety net; lower it to cut cost; 0 disables)
# keep_recent_turns = 2       # User turns kept verbatim after compaction
# max_tool_rounds = 12        # Tool-use rounds for the memory-writing pass

# Retrieval — ranking for internal memory retrieval. "auto" uses hybrid
# semantic+lexical when an embedder is resolved, otherwise lexical.
# [memory.retrieval]
# mode = "auto"               # "auto", "lexical", or "hybrid"

# Thinking — how prior-turn extended-thinking blocks are handled on outgoing
# requests. This is the GLOBAL fallback; the effect is model-dependent, so
# override per model via `shore model setting preserve_prior_turns <bool>`.
# [memory.thinking]
# preserve_prior_turns = true # false strips prior thinking to save tokens — safe on
#                             # Anthropic Claude 4.x. DeepSeek V3.1+ / Moonshot Kimi-thinking
#                             # always replay reasoning_content and ignore this.

# ── Notifications ────────────────────────────────────────────────────────

# [notifications]
# enabled = false
# backend = "notify_send"     # "notify_send", "ntfy", or "command"
# generation_threshold = "0s" # Only notify message_complete when generation exceeds this (0 = always)

# [notifications.ntfy]
# url = "https://ntfy.sh"
# topic = ""
# token = ""                  # Optional auth token for self-hosted instances

# [notifications.command]
# template = ""               # Shell command; use {title} and {body} as placeholders

# [notifications.events]
# autonomous_message = true
# cache_warning = true
# compaction_complete = true
# error = true
# message_complete = false
# usage_warning = true

# ── Usage budgets ────────────────────────────────────────────────────────

# [usage]
# timezone = "local"                  # "local" or "utc"
# allow_compaction_over_budget = true # Let compaction run even over a blocking budget
#
# [[usage.budgets]]
# name = "daily total"
# period = "day"                      # hour, day, week, month
# cost_usd = 10.00
# warn_at = [0.5, 0.8, 1.0]           # Crossings emit usage_warning frames + notifications
# limit = "warn"                      # warn, block, pause_background
#
# [[usage.budgets]]
# name = "background"
# period = "day"
# usage_kind = ["heartbeat", "dreaming"] # omit compaction so it can still save future cost
# cost_usd = 2.00
# limit = "pause_background"
#
# [[usage.budgets]]
# name = "overflow key monthly"
# period = "month"
# provider = "openrouter"
# api_key = "overflow"                # Friendly name from [[providers.<name>.keys]]
# cost_usd = 25.00
# limit = "block"
# allow_compaction_over_budget = false # Optional per-budget strict override
#
# [usage.spike_warnings]
# enabled = false                      # `shore usage --budget` reports spikes when true
# period = "hour"
# multiplier = 3.0
# min_cost_usd = 1.00

# ── Connections ──────────────────────────────────────────────────────────

# Matrix: External mode (connect to an existing homeserver)
# [connections.matrix]
# enabled = true
# homeserver = "https://matrix.example.com"
# user_id = "@shore:example.com"
# room_id = "!abc123:example.com"
# trusted_user = "@user:example.com"

# Matrix: Embedded mode (shore-matrix manages a conduwuit-compatible server)
# [connections.matrix]
# trusted_user = "@user:shore.local"
#
# [connections.matrix.embedded]
# server_name = "shore.local"          # Cannot be changed after first run. Default: "localhost"
# admin_password = "your-admin-pass"   # Required
# port = 6167
# admin_user = "shore-admin"
# # bind_address = "127.0.0.1"         # Default: loopback only. "0.0.0.0" or a LAN/Tailscale
#                                      # IP exposes the homeserver to other devices.
# # data_dir = "..."                   # Default: $XDG_DATA_HOME/shore/matrix-server/
# # binary = "continuwuity"            # Default: auto-detect

# Telegram / Discord (reserved for future use)
# [connections.telegram]
# [connections.discord]

# ── Services ─────────────────────────────────────────────────────────────
# Supervised helper processes the daemon manages. Currently only the LLM
# service slot is used (reserved for an external LLM proxy).

# [services.llm]
# command = "node shore-llm/dist/index.js"  # Command to spawn the LLM service
# socket = "/run/shore-llm.sock"            # Unix socket the service listens on

# ── Advanced ─────────────────────────────────────────────────────────────

# [advanced]
# api_payload_logging = false
# cache_forensics = false          # Write prompt-cache diagnostics when debugging cache behavior
# editor = "nvim"                  # Override $VISUAL / $EDITOR
# max_retries = 2
# retry_backoff = "500ms"          # Base delay; doubles on each retry
# max_image_size = 2000000         # Resize images above this size (bytes) before upload; 0 = disable
# Data directory: override via $XDG_DATA_HOME (default: ~/.local/share/shore)

# The Bun LLM sidecar handles all chat/generate/image calls and is on by default.
# [advanced.llm_sidecar]
# enabled = true
# socket_path = "/path/to/llm.sock" # Defaults to <runtime_dir>/llm.sock when unset

# ── Embedding ────────────────────────────────────────────────────────────
# Identity is provider:model_id; transport + credentials come from
# [providers.<provider>]. The optional settings table carries only category
# knobs (dimensions). Select the model with [defaults].embedding above.
# Any endpoint speaking /v1/embeddings works (OpenAI, Voyage compat, a local
# text-embedding-inference server, etc.).

# [providers.openai]
# api_key_env = "OPENAI_API_KEY"
#
# [embedding."openai:text-embedding-3-large"]
# dimensions = 1024   # Omit to get the model's native width (e.g. 3072)

# Self-hosted example:
# [providers.local-tei]
# base_url = "http://127.0.0.1:8080/v1"
# api_key_env = "TEI_API_KEY"   # Must point at a set var; use any non-empty value if unchecked
#
# [embedding."local-tei:BAAI/bge-large-en-v1.5"]
# dimensions = 1024

# ── Image generation ─────────────────────────────────────────────────────
# Same shape: identity provider:model_id, transport on [providers.*], optional
# settings table (size/quality for OpenAI; aspect_ratio/image_size for OpenRouter).

# OpenAI DALL-E:
# [providers.openai]
# api_key_env = "OPENAI_API_KEY"
#
# [image_generation."openai:dall-e-3"]
# size = "1024x1024"
# quality = "hd"

# OpenRouter (Gemini, Flux, etc.):
# [providers.openrouter]
# api_key_env = "OPENROUTER_API_KEY"
# base_url = "https://openrouter.ai/api/v1"
#
# [image_generation."openrouter:google/gemini-2.5-flash-image"]
# aspect_ratio = "1:1"
