# Shore V2 — Example Configuration
# All values shown are defaults unless noted otherwise.
#
# Models are configured inline under [chat.<provider>.<model>].
# You can also split config with `include = ["extra.toml"]` or conf.d/*.toml.

# include = ["models.toml"]   # Optional explicit includes
                               # conf.d/*.toml is also auto-loaded

[daemon]
# socket_path = "/tmp/shore.sock"   # Override Unix socket path (auto-generated if omitted)

[defaults]
# model = "claude-sonnet"           # Must match a model key below
# tool_model = "mistral-small"      # Default model for tool-use calls
# embedding = "text-large"          # Default embedding profile
# image_generation = "gemini-flash" # Default image generation profile
stream = true

[behavior.autonomy]
enabled = false
personality = 0.5                    # 0.0–1.0
max_unanswered = 1
max_deferral_hours = 24.0

[behavior.autonomy.heartbeat]
enabled = true                       # Set false to disable heartbeat scheduling
session_gap_secs = 1800              # 30 min — idle gap marking session boundary
session_probe_floor_secs = 180       # 3 min — minimum idle before post-session probe
dormant_threshold = 8                # Max consecutive unanswered probes

[behavior.autonomy.compaction]
enabled = true                       # Set false to disable compaction triggers
idle_trigger_minutes = 30
min_messages = 20                    # Minimum messages before any compaction trigger
max_messages = 60                    # Force compaction at this message count

[behavior.autonomy.collation]
enabled = true                       # Master kill switch for collation
auto_run = true                      # Run automatically after compaction

[behavior.autonomy.cache_keepalive]
enabled = true
ttl_minutes = 5
max_pings = 12

[behavior.tool_use]
enabled = true
max_iterations = 10

# Per-tool toggles — set to false to disable individual tools.
# [behavior.tool_use.tools]
# memory = true
# send_image = true
# list_images = true
# recall_image = true
# generate_image = true
# web_search = true
# fetch_url = true
# check_time = true
# roll_dice = true
# activity_heatmap = true

# [behavior.tool_use.search]
# api_key_env = "TAVILY_API_KEY"     # Env var holding the Tavily API key
# max_results = 5                     # Default results per search
# search_depth = "basic"              # "basic" or "advanced"
# include_answer = true               # Include Tavily's synthesized answer

[memory]
rag_results = 5
rag_threshold = 0.3
image_enabled = true                 # Set false to disable image memory subsystem

# [connections.tcp]
# enabled = false                    # Set true to enable TCP listener
# addr = "127.0.0.1:7320"
# allowed_hosts = []                 # Empty = allow all; otherwise list of allowed IPs

# [connections.matrix]
# homeserver = "https://matrix.example.com"
# user_id = "@shore:example.com"
# room_id = "!abc123:example.com"

[services.llm]
# command = "node /path/to/shore-llm/dist/index.js"
# socket = "/run/user/1000/shore/llm.sock"

[advanced]
cache_invalidation_warnings = true
# editor = "nvim"                    # Override $VISUAL / $EDITOR
# max_retries = 2                    # LLM retry attempts (default: 2)
# retry_backoff_seconds = 0.5        # Base delay between retries (exponential backoff)
# Data directory: use $XDG_DATA_HOME to override (default: ~/.local/share/shore)

# ── Chat models ─────────────────────────────────────────────────────────
# Provider-level defaults cascade into every model under that provider.
# Model-level values take precedence.
#
# `sdk` selects the wire protocol (anthropic, openai, gemini, deepseek, zhipuai).
# Known providers (anthropic, openrouter, deepseek, gemini, xai, zhipuai) have
# hardcoded defaults for sdk, api_key_env, temperature, max_tokens, etc.

[chat.anthropic.claude-sonnet]
model_id = "claude-sonnet-4-6"

[chat.anthropic.claude-opus]
model_id = "claude-opus-4-6"
max_tokens = 8192

[chat.openai.gpt-4o]
model_id = "gpt-4o"

[chat.gemini.gemini-pro]
model_id = "gemini-2.5-pro"

