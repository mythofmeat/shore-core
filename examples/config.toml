# Shore V2 — Example Configuration
# All values shown are defaults unless noted otherwise.
#
# Models are configured inline under [chat.<provider>.<model>].
# You can also split config with `include = ["extra.toml"]` or conf.d/*.toml.

# include = ["models.toml"]   # Optional explicit includes
                               # conf.d/*.toml is also auto-loaded

# ── Daemon ───────────────────────────────────────────────────────────────

# [daemon]
# socket_path = "/tmp/shore.sock"   # Auto-generated if omitted

# ── Defaults ─────────────────────────────────────────────────────────────

[defaults]
model = "claude-sonnet"            # Must match a key in [chat.*.*] below
# tool_model = "mistral-small"      # Default model for tool-use calls
# memory_agent = "mistral-small"    # Default model for memory agent calls
# embedding = "text-large"          # Default embedding profile
# image_generation = "gemini-flash" # Default image generation profile
# display_name = "Your Name"        # {{user}} in templates; falls back to $USER
# stream = true

# ── Autonomy ─────────────────────────────────────────────────────────────
# Controls the character's autonomous behavior — what makes it feel present
# and real. Disabled by default; enable to allow unprompted messages.

# [behavior.autonomy]
# enabled = false
# personality = 0.5          # 0.0 (reserved) → 1.0 (proactive); shapes probe frequency
# max_unanswered = 1         # Back off after this many unanswered autonomous messages
# max_deferral_hours = 24.0  # Maximum hours the character will wait before sending

# [behavior.autonomy.heartbeat]
# enabled = true
# session_gap_secs = 1800         # 30 min idle marks a session boundary
# session_probe_floor_secs = 180  # Minimum idle before a post-session probe fires
# dormant_threshold = 1           # Consecutive unanswered probes before going dormant

# ── Tool use ─────────────────────────────────────────────────────────────

# [behavior.tool_use]
# enabled = true
# max_iterations = 10  # Max tool-call rounds per turn before forcing a final response

# Per-tool toggles — all enabled by default; set to false to disable.
# [behavior.tool_use.tools]
# memory = true
# send_image = true
# list_images = true
# recall_image = true
# generate_image = true
# web_search = true
# fetch_url = true
# check_time = true
# roll_dice = true
# activity_heatmap = true

# [behavior.tool_use.search]
# api_key_env = "TAVILY_API_KEY"  # Env var holding the Tavily API key
# max_results = 5
# search_depth = "basic"          # "basic" or "advanced"
# include_answer = true           # Include Tavily's synthesized answer

# ── Memory & context management ──────────────────────────────────────────

# Compaction — trims the active conversation when it grows too long.
# [memory.compaction]
# enabled = true
# idle_trigger_minutes = 30  # Trigger after this many minutes of inactivity
# min_turns = 8              # Don't compact below this many user turns
# max_turns = 16             # Force compaction when this many user turns is reached
# keep_recent_turns = 2      # User turns to retain verbatim after compaction

# Collation — periodically re-synthesises the memory store for quality.
# [memory.collation]
# enabled = true
# auto_run = true  # Run automatically after each compaction

# ── Notifications ────────────────────────────────────────────────────────

# [notifications]
# enabled = false
# backend = "notify_send"  # "notify_send", "ntfy", or "command"

# [notifications.ntfy]
# url = "https://ntfy.sh"
# topic = ""
# token = ""  # Optional auth token for self-hosted instances

# [notifications.command]
# template = ""  # Shell command; use {title} and {body} as placeholders

# generation_threshold_secs = 0  # Only notify message_complete when generation exceeds this (0 = always)

# [notifications.events]
# autonomous_message = true
# cache_warning = true
# compaction_complete = true
# collation_complete = true
# error = true
# message_complete = false  # Notify when message generation completes

# ── Connections ──────────────────────────────────────────────────────────

# [connections.tcp]
# enabled = false
# addr = "127.0.0.1:7320"
# allowed_hosts = []  # Empty = allow all; otherwise list allowed IPs

# ── Matrix: External mode (connect to an existing homeserver) ─────────────
# [connections.matrix]
# enabled = true
# homeserver = "https://matrix.example.com"
# user_id = "@shore:example.com"
# room_id = "!abc123:example.com"
# trusted_user = "@user:example.com"

# ── Matrix: Embedded mode (shore-matrix manages a local homeserver) ───────
# Uses a conduwuit-compatible server (continuwuity, conduwuit, or tuwunel).
# [connections.matrix]
# trusted_user = "@user:shore.local"
#
# [connections.matrix.embedded]
# server_name = "shore.local"          # Cannot be changed after first run. Default: "localhost"
# admin_password = "your-admin-pass"   # Required
# port = 6167
# admin_user = "shore-admin"
# # data_dir = "..."                   # Default: $XDG_DATA_HOME/shore/matrix-server/
# # binary = "continuwuity"            # Default: auto-detect

# ── Services ─────────────────────────────────────────────────────────────

# [services.matrix]
# enabled = true
# command = "shore-mx"
# socket = "/run/user/1000/shore/matrix.sock"

# ── Advanced ─────────────────────────────────────────────────────────────

# [advanced]
# cache_invalidation_warnings = true
# api_payload_logging = false
# editor = "nvim"                   # Override $VISUAL / $EDITOR
# max_retries = 2
# retry_backoff_seconds = 0.5       # Base delay; doubles on each retry
# Data directory: override via $XDG_DATA_HOME (default: ~/.local/share/shore)

# ── Chat models ──────────────────────────────────────────────────────────
# Provider-level settings cascade into all models under that provider.
# Model-level values take precedence over provider-level values.
#
# Known providers with hardcoded defaults:
#   anthropic  — sdk: anthropic, api_key_env: ANTHROPIC_API_KEY,  temp: 1.0, max_tokens: 8192, max_context: 200000
#   openrouter — sdk: openai,     api_key_env: OPENROUTER_API_KEY, temp: 1.0, max_tokens: 8192, max_context: 200000
#   deepseek   — sdk: deepseek,   api_key_env: DEEPSEEK_API_KEY,   temp: 1.0, max_tokens: 8192, max_context: 200000
#   gemini     — sdk: gemini,     api_key_env: GEMINI_API_KEY,     temp: 1.0, max_tokens: 8192, max_context: 200000
#   xai        — sdk: openai,     api_key_env: XAI_API_KEY,        temp: 1.0, max_tokens: 8192, max_context: 200000
#   zhipuai    — sdk: zhipuai,    api_key_env: ZAI_API_KEY,        temp: 1.0, max_tokens: 8192, max_context: 200000
#   zai        — sdk: zai,       api_key_env: ZAI_API_KEY,        temp: 1.0, max_tokens: 8192, max_context: 200000
#   nanogpt    — sdk: openai,    api_key_env: NANOGPT_API_KEY,    temp: 1.0, max_tokens: 8192, max_context: 200000
#
# Available fields (provider- or model-level):
#
#   — Auth & connection —
#   sdk = "anthropic"                        # Wire protocol: anthropic, openai, gemini, deepseek, zhipuai, zai
#   api_key_env = "MY_API_KEY"               # Env var holding the API key
#   base_url = "https://..."                 # Override the API base URL
#   keepalive_enabled = false                # Keep the HTTP connection alive between requests
#
#   — Sampling —
#   max_context_tokens = 200000              # Context window size
#   max_tokens = 8192                        # Maximum output tokens
#   temperature = 1.0
#   top_p = 1.0
#
#   — Reasoning / thinking —
#   reasoning_effort = "high"               # Anthropic: "low"|"medium"|"high"|"max" (adaptive) or "adaptive"; OpenAI/DeepSeek: "low"|"medium"|"high"
#   budget_tokens = 8192                    # Thinking token budget — Anthropic (legacy), Gemini
#
#   — Prompt caching (Anthropic) —
#   cache_ttl = "5m"                        # e.g. "5m", "1h"
#   keepalive_enabled = true                # Send periodic pings to keep the cache alive (cost-saving)
#   keepalive_ttl_minutes = 5              # Derive ping interval from TTL (default: 4 min)
#   keepalive_max_pings = 15               # Stop after this many pings to avoid runaway cost
#
#   — Provider-specific —
#   openrouter_provider = {order = ["anthropic"]}  # OpenRouter provider routing hints
#   vertex_project = "my-gcp-project"       # GCP project for Vertex AI
#   vertex_location = "us-central1"         # GCP region for Vertex AI
#   gemini_generation = 2
#   gemini_web_search = false               # Enable Gemini's built-in web search
#   zai_clear_thinking = false              # false = preserve reasoning across turns (Z.AI)
#   zai_subscription = false                # true = use Z.AI coding subscription endpoint

[chat.anthropic.claude-sonnet]
model_id = "claude-sonnet-4-6"

# [chat.anthropic.claude-opus]
# model_id = "claude-opus-4-6"
# max_tokens = 16384

# [chat.openai.gpt-4o]
# model_id = "gpt-4o"

# [chat.gemini.gemini-pro]
# model_id = "gemini-2.5-pro"

# [chat.zai.glm-5]
# model_id = "glm-5"
# zai_clear_thinking = false    # Preserve reasoning across turns
# zai_subscription = false      # Set true to use the coding subscription endpoint

# [chat.nanogpt.claude-opus]
# model_id = "anthropic/claude-opus-4.6"   # NanoGPT uses provider/model format

# ── Thinking / reasoning ─────────────────────────────────────────────────
#
# Anthropic (Opus 4.6, Sonnet 4.6) — reasoning_effort (recommended):
#   reasoning_effort = "adaptive"  model decides whether/how much to think
#   reasoning_effort = "high"      always think, deep reasoning (default effort)
#   reasoning_effort = "medium"    moderate thinking, may skip for simple queries
#   reasoning_effort = "low"       minimal thinking
#   reasoning_effort = "max"       deepest reasoning, Opus 4.6 only
#
# Anthropic (legacy / older models) — budget_tokens:
#   budget_tokens = 8192           explicit thinking token budget
#
# OpenAI / DeepSeek — reasoning_effort:
#   reasoning_effort = "high"      "low" | "medium" | "high"
#
# Gemini — budget_tokens:
#   budget_tokens = 8192           thinking token budget
#
# Z.AI (GLM-5) — thinking enabled by default:
#   zai_clear_thinking = false     preserve reasoning across turns (default)
#   zai_clear_thinking = true      strip reasoning from prior turns (cheaper)
#
# Examples:
#
# [chat.anthropic.claude-opus-thinking]
# model_id = "claude-opus-4-6"
# max_tokens = 16384
# reasoning_effort = "high"
#
# [chat.anthropic.claude-sonnet-adaptive]
# model_id = "claude-sonnet-4-6"
# max_tokens = 16384
# reasoning_effort = "adaptive"
#
# [chat.openai.o3]
# model_id = "o3"
# reasoning_effort = "high"
#
# [chat.deepseek.deepseek-r1]
# model_id = "deepseek-reasoner"
# reasoning_effort = "high"
#
# [chat.gemini.gemini-pro-thinking]
# model_id = "gemini-2.5-pro"
# budget_tokens = 8192
#
# [chat.zai.glm-5-thinking]
# model_id = "glm-5"
# zai_clear_thinking = false

