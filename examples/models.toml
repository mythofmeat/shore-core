# Shore V2 — Example Model Configuration
#
# Provider-level defaults are merged into every model that shares the provider.
# Model-level values take precedence over provider defaults.

[provider_defaults.anthropic]
max_tokens = 4096
api_key_env = "ANTHROPIC_API_KEY"

[provider_defaults.openai]
max_tokens = 4096
api_key_env = "OPENAI_API_KEY"

[[models]]
name = "claude-sonnet"
provider = "anthropic"
model_id = "claude-sonnet-4-20250514"

[[models]]
name = "claude-opus"
provider = "anthropic"
model_id = "claude-opus-4-20250514"
max_tokens = 8192

[[models]]
name = "gpt-4o"
provider = "openai"
model_id = "gpt-4o"

[[models]]
name = "gemini-pro"
provider = "gemini"
model_id = "gemini-2.5-pro"
api_key_env = "GOOGLE_API_KEY"
