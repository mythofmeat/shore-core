name: Agent Harness Guardrails

on:
  push:
    branches:
      - main
      - staging
  pull_request:

jobs:
  harness-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Validate agent harness knowledge base
        run: python3 scripts/harness-check.py
