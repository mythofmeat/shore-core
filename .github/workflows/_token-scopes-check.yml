name: _token-scopes-check

# Throwaway workflow: prints the scopes / permissions of REPO_ARCH_TOKEN
# so we can decide whether release-plz can reuse it. Delete after one run.

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Probe token scopes (classic PAT)
        env:
          TOKEN: ${{ secrets.REPO_ARCH_TOKEN }}
        run: |
          echo "=== /user response headers (classic PAT scopes) ==="
          curl -sSI -H "Authorization: token $TOKEN" https://api.github.com/user \
            | grep -iE '^(x-oauth-scopes|x-accepted-oauth-scopes|x-github-sso|github-authentication-token-expiration|status):' \
            || echo "(no scope headers — likely a fine-grained PAT or GitHub App token)"

          echo
          echo "=== Can token READ this repo (silvershore)? ==="
          curl -sS -o /dev/null -w "HTTP %{http_code}\n" \
            -H "Authorization: token $TOKEN" \
            https://api.github.com/repos/mythofmeat/silvershore

          echo
          echo "=== Can token READ repo-arch? ==="
          curl -sS -o /dev/null -w "HTTP %{http_code}\n" \
            -H "Authorization: token $TOKEN" \
            https://api.github.com/repos/mythofmeat/repo-arch

          echo
          echo "=== Can token list silvershore PRs (proxy for pull-request read)? ==="
          curl -sS -o /dev/null -w "HTTP %{http_code}\n" \
            -H "Authorization: token $TOKEN" \
            "https://api.github.com/repos/mythofmeat/silvershore/pulls?state=open&per_page=1"

          echo
          echo "=== Token /user identity ==="
          curl -sS -H "Authorization: token $TOKEN" https://api.github.com/user \
            | python3 -c "import sys,json;d=json.load(sys.stdin);print('login:',d.get('login'),' type:',d.get('type'))"
