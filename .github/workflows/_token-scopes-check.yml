name: _token-scopes-check

on:
  push:
    paths:
      - .github/workflows/_token-scopes-check.yml

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Probe token permissions on silvershore
        env:
          TOKEN: ${{ secrets.REPO_ARCH_TOKEN }}
        run: |
          echo "=== Token expiration / scope headers ==="
          curl -sSI -H "Authorization: token $TOKEN" https://api.github.com/user \
            | grep -iE '^(x-oauth-scopes|github-authentication-token-expiration):' \
            || echo "(none)"

          probe() {
            local label="$1" method="$2" path="$3"
            local code
            code=$(curl -sS -o /dev/null -w "%{http_code}" -X "$method" \
              -H "Authorization: token $TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com$path")
            printf "  %-50s %s %s -> HTTP %s\n" "$label" "$method" "$path" "$code"
          }

          echo
          echo "=== silvershore endpoints ==="
          probe "repo metadata"        GET  /repos/mythofmeat/silvershore
          probe "list PRs"             GET  "/repos/mythofmeat/silvershore/pulls?state=open&per_page=1"
          probe "list refs/heads"      GET  /repos/mythofmeat/silvershore/git/refs/heads
          probe "list workflows"       GET  /repos/mythofmeat/silvershore/actions/workflows
          probe "list branches"        GET  /repos/mythofmeat/silvershore/branches

          echo
          echo "=== Permission decision summary ==="
          echo "Need all four: contents:rw, pull-requests:rw, workflows:rw, metadata:r"
          echo "If any silvershore probe above is 403/404, the corresponding permission is missing."
