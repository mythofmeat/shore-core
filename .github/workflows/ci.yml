name: CI

on:
  push:
    branches:
      - main
      - staging
  pull_request:

jobs:
  ci:
    uses: mythofmeat/repo-arch/.github/workflows/ci-rust.yml@main
    with:
      system_deps: "libasound2-dev protobuf-compiler"

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev protobuf-compiler

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage report
        run: cargo llvm-cov --workspace --all-targets --lcov --output-path lcov.info

      - name: Upload lcov report
        uses: actions/upload-artifact@v4
        with:
          name: lcov.info
          path: lcov.info
