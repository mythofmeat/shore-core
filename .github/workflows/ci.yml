name: CI

on:
  push:
    branches:
      - main
      - staging
  pull_request:

jobs:
  ci:
    uses: mythofmeat/repo-arch/.github/workflows/ci-rust.yml@main
    with:
      system_deps: "libasound2-dev protobuf-compiler"

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev protobuf-compiler

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@a878e16c6ffa29bf3511f75f99b0ca37e18715b0 # v2.51.0
        with:
          tool: cargo-llvm-cov

      - name: Generate coverage report
        run: cargo llvm-cov --workspace --all-targets --lcov --output-path lcov.info

      - name: Upload lcov report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: lcov.info
          path: lcov.info
