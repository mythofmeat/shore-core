name: CI

on:
  push:
    branches:
      - main
      - staging
  pull_request:

jobs:
  ci:
    uses: mythofmeat/repo-arch/.github/workflows/ci-rust.yml@main
    with:
      system_deps: "libasound2-dev protobuf-compiler"

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev protobuf-compiler

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@a878e16c6ffa29bf3511f75f99b0ca37e18715b0 # v2.51.0
        with:
          tool: cargo-llvm-cov

      - name: Generate coverage report
        run: cargo llvm-cov --workspace --all-targets --lcov --output-path lcov.info

      - name: Upload lcov report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lcov.info
          path: lcov.info
