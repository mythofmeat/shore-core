name: Build and publish Arch packages

# Per-crate tags from release-plz drive separate Arch builds. shore-daemon
# and shore-cli ship as independent packages so they can version (and
# update) independently.
on:
  push:
    tags:
      - 'shore-daemon-v*'
      - 'shore-cli-v*'

jobs:
  publish-daemon:
    if: startsWith(github.ref_name, 'shore-daemon-v')
    permissions:
      contents: write
    uses: mythofmeat/repo-arch/.github/workflows/publish-arch-rust.yml@main
    with:
      pkgbuild_dir: contrib/shore-daemon
      # bun builds the LLM sidecar; alsa-lib/protobuf were copy-paste leftovers
      # (no audio deps, no .proto compilation / build.rs in the tree).
      extra_pacman_packages: "bun"
    secrets: inherit

  publish-cli:
    if: startsWith(github.ref_name, 'shore-cli-v')
    permissions:
      contents: write
    uses: mythofmeat/repo-arch/.github/workflows/publish-arch-rust.yml@main
    with:
      pkgbuild_dir: contrib/shore-cli
    secrets: inherit
