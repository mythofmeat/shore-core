name: Build and publish Arch packages

on:
  push:
    tags: ['v*']

env:
  REPO_NAME: repo-arch
  REPO_OWNER: mythofmeat
  # Cargo build artifacts live outside makepkg's ephemeral src/ dir so
  # they can be cached between runs.
  CARGO_TARGET_DIR_HOST: /home/builder/cargo-target
  CARGO_HOME_HOST: /home/builder/.cargo

jobs:
  package:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    permissions:
      contents: write  # for the silvershore release (notes only; no assets)
    steps:
      - name: Cache pacman package cache
        uses: actions/cache@v4
        with:
          path: /var/cache/pacman/pkg
          key: pacman-${{ hashFiles('.github/workflows/package.yml') }}
          restore-keys: pacman-

      - name: Install system dependencies
        run: |
          pacman -Syu --noconfirm --needed \
            base-devel clang mold git git-cliff jq nodejs github-cli sudo rustup openssl alsa-lib protobuf
          rustup default stable
          useradd -m builder
          echo 'builder ALL=(ALL) NOPASSWD: ALL' > /etc/sudoers.d/builder

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # git-cliff needs the full history

      - name: Cache cargo registry and git db
        uses: actions/cache@v4
        with:
          path: |
            /home/builder/.cargo/registry
            /home/builder/.cargo/git
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-registry-

      - name: Cache cargo build target
        uses: actions/cache@v4
        with:
          path: /home/builder/cargo-target
          key: cargo-target-${{ hashFiles('**/Cargo.lock') }}-${{ github.sha }}
          restore-keys: |
            cargo-target-${{ hashFiles('**/Cargo.lock') }}-
            cargo-target-

      - name: Mark workspace as git-safe
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Verify tag is on main
        run: |
          git fetch origin main
          git merge-base --is-ancestor HEAD origin/main || \
            { echo "::error::Tag is not on main — skipping build"; exit 1; }

      - name: Pin PKGBUILD to tag and local checkout
        working-directory: contrib
        run: |
          TAG="${{ github.ref_name }}"
          VER="${TAG#v}"
          sed -i "s|^pkgver=.*|pkgver=${VER}|" PKGBUILD
          # Build from the checkout instead of cloning the (private) remote
          sed -i "s|^source=.*|source=(\"\${pkgbase}::git+file://${GITHUB_WORKSPACE}#tag=${TAG}\")|" PKGBUILD
          # Symlink makepkg's default 'target' dir to a persistent cacheable
          # location. Keeps package_*() functions' 'target/release/...' paths
          # intact while the actual artifacts live outside src/.
          sed -i "s|export CARGO_TARGET_DIR=target|ln -sfn ${CARGO_TARGET_DIR_HOST} target|" PKGBUILD
          chown -R builder:builder "$GITHUB_WORKSPACE"
          # Make sure cache dirs exist and are owned by builder (actions/cache
          # creates any missing parent dirs as root).
          mkdir -p "${CARGO_TARGET_DIR_HOST}" "${CARGO_HOME_HOST}"
          chown -R builder:builder /home/builder

      - name: Build packages
        working-directory: contrib
        run: sudo -u builder makepkg -sf --noconfirm

      - name: Fetch existing repo database
        working-directory: contrib
        env:
          GH_TOKEN: ${{ secrets.REPO_ARCH_TOKEN }}
        run: |
          # Pull the current db tarball if any project has published into
          # repo-arch before. Missing asset is fine — we start fresh.
          gh release download latest \
            -R "${REPO_OWNER}/${REPO_NAME}" \
            -p "${REPO_NAME}.db.tar.zst" \
            -p "${REPO_NAME}.files.tar.zst" \
            2>/dev/null || echo "No existing db; starting fresh."

      - name: Merge into repo database
        working-directory: contrib
        run: |
          sudo -u builder repo-add "${REPO_NAME}.db.tar.zst" *.pkg.tar.zst
          # repo-add leaves .db and .files as symlinks; dereference so
          # GitHub Release stores real files, not broken symlinks.
          for link in "${REPO_NAME}.db" "${REPO_NAME}.files"; do
            cp -L "$link" "${link}.real"
            rm "$link"
            mv "${link}.real" "$link"
          done

      - name: Publish packages to repo-arch
        working-directory: contrib
        env:
          GH_TOKEN: ${{ secrets.REPO_ARCH_TOKEN }}
        run: |
          gh release upload latest \
            -R "${REPO_OWNER}/${REPO_NAME}" \
            --clobber \
            *.pkg.tar.zst \
            "${REPO_NAME}.db" "${REPO_NAME}.db.tar.zst" \
            "${REPO_NAME}.files" "${REPO_NAME}.files.tar.zst"

      - name: Generate release notes
        run: git-cliff --latest -o RELEASE_NOTES.md

      - name: Create silvershore tag release (notes only)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file RELEASE_NOTES.md
