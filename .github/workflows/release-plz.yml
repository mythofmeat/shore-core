name: release-plz

# Manual-only: the release PR (version bumps + CHANGELOG) and publish step run
# only when dispatched, so rapid iteration on main doesn't spawn release PRs.
# Click "Run workflow" when a build is worth distributing. A run on an unchanged
# main is a no-op (no new conventional commits => no bump, no PR, no publish).
on:
  workflow_dispatch:

jobs:
  release-plz:
    permissions:
      contents: write
      pull-requests: write
    uses: mythofmeat/repo-arch/.github/workflows/release-plz-rust.yml@main
    with:
      system_deps: "libasound2-dev protobuf-compiler"
    secrets: inherit
