name: release-plz

# Release cutting is an explicit decision, not a per-push reflex, so this never
# runs on push to main (rapid iteration would otherwise spawn release PRs).
#   - workflow_dispatch: click "Run workflow" when a build is worth distributing.
#   - schedule: weekly safety net in case a manual run is forgotten.
# Either trigger on an unchanged main is a no-op: no new conventional commits
# => no version bump, no release PR, no publish.
on:
  workflow_dispatch:
  schedule:
    # Mondays 00:00 UTC (Mon 10:00 AEST). Opens a release PR if commits landed.
    - cron: "0 0 * * 1"

jobs:
  release-plz:
    permissions:
      contents: write
      pull-requests: write
    uses: mythofmeat/repo-arch/.github/workflows/release-plz-rust.yml@main
    with:
      system_deps: "libasound2-dev protobuf-compiler"
    secrets: inherit
