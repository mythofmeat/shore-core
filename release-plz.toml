[workspace]
# Only library crates publish to crates.io. Binary crates (shore-daemon,
# shore-cli) and the integration test harness ship via Arch packaging and
# `cargo install`, not crates.io.
git_release_enable = true
changelog_update = true

# --- Library crates that publish to crates.io -------------------------------
# Each library tracks its own version; release-plz computes bumps from
# conventional commits on a per-crate basis.

[[package]]
name = "shore-protocol"
publish = true
release = true

[[package]]
name = "shore-config"
publish = true
release = true

[[package]]
name = "shore-swp-client"
publish = true
release = true

[[package]]
name = "shore-diagnostics"
publish = true
release = true

# --- Binary-side workspace members ------------------------------------------
# shore-daemon, shore-cli, shore-llm, shore-ledger, and shore-swp-server all
# share `[workspace.package].version` via `version.workspace = true`. They
# ship together as one Arch package (shore-core).
#
# All five are marked release = true so release-plz sees commits touching any
# of their files and computes bumps. Because they share the workspace version
# line, any bump lands on `[workspace.package].version` — which advances all
# five crates at once.
#
# Only shore-daemon emits a git tag and that tag is named `v{{ version }}`
# (overriding release-plz's default `{{ package }}-v{{ version }}`). The
# other four set `git_tag_enable = false` so we get exactly one v$VERSION
# tag per release. That tag triggers .github/workflows/package.yml, which
# builds and publishes the Arch package; git-cliff there owns the GitHub
# release notes, so release-plz's per-crate releases/changelogs are
# suppressed across the binary side.

[[package]]
name = "shore-daemon"
publish = false
release = true
git_tag_name = "v{{ version }}"
git_release_enable = false
changelog_update = false

[[package]]
name = "shore-cli"
publish = false
release = true
git_tag_enable = false
git_release_enable = false
changelog_update = false

[[package]]
name = "shore-llm"
publish = false
release = true
git_tag_enable = false
git_release_enable = false
changelog_update = false

[[package]]
name = "shore-ledger"
publish = false
release = true
git_tag_enable = false
git_release_enable = false
changelog_update = false

[[package]]
name = "shore-swp-server"
publish = false
release = true
git_tag_enable = false
git_release_enable = false
changelog_update = false

# --- Truly non-released crates ----------------------------------------------

[[package]]
name = "shore-test-harness"
publish = false
release = false
