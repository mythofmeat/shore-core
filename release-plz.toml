[workspace]
# Only library crates publish to crates.io. Binary crates (shore-daemon,
# shore-cli) and the integration test harness ship via Arch packaging and
# `cargo install`, not crates.io.
git_release_enable = true
changelog_update = true

# --- Library crates that publish to crates.io -------------------------------
# Each library tracks its own version; release-plz computes bumps from
# conventional commits on a per-crate basis.

[[package]]
name = "shore-protocol"
publish = true
release = true

[[package]]
name = "shore-config"
publish = true
release = true

[[package]]
name = "shore-swp-client"
publish = true
release = true

[[package]]
name = "shore-diagnostics"
publish = true
release = true

# --- Workspace-internal crates that DO NOT publish --------------------------

[[package]]
name = "shore-llm"
publish = false
release = false

[[package]]
name = "shore-ledger"
publish = false
release = false

[[package]]
name = "shore-swp-server"
publish = false
release = false

[[package]]
name = "shore-daemon"
publish = false
release = true
# Anchor crate for the binary release track. shore-daemon, shore-cli, shore-llm,
# shore-ledger, and shore-swp-server all share `workspace.package.version` via
# `version.workspace = true`, so any of their version bumps lands on the same
# workspace version line. release-plz tracks all of them (commits touching any
# of them compute a bump), but only this anchor produces the tag — which means
# exactly one `v$VERSION` tag fires per release, and that tag triggers the
# Arch packaging workflow in .github/workflows/package.yml.
git_tag_name = "v{{ version }}"
# git-cliff (via package.yml) generates the GitHub release notes on tag push,
# so suppress release-plz's release/changelog handling for the anchor.
git_release_enable = false
changelog_update = false

[[package]]
name = "shore-cli"
publish = false
release = false

[[package]]
name = "shore-test-harness"
publish = false
release = false
