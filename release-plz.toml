[workspace]
# All released workspace members publish to crates.io and get a per-crate
# GitHub release + CHANGELOG.md entry. Each crate's tag is the default
# `{{ package }}-v{{ version }}` (e.g., `shore-daemon-v1.8.5`).
#
# The Arch packaging workflow (.github/workflows/package.yml) gates on
# `shore-daemon-v*` and `shore-cli-v*` tags specifically, so each binary
# ships its own Arch package independently.
git_release_enable = true
changelog_update = true

# --- Core libraries ---------------------------------------------------------

[[package]]
name = "shore-protocol"
publish = true
release = true

[[package]]
name = "shore-config"
publish = true
release = true

[[package]]
name = "shore-swp-client"
publish = true
release = true

[[package]]
name = "shore-diagnostics"
publish = true
release = true

# --- Binary-side crates -----------------------------------------------------
# These are binaries (or binary-support libs) with no external crates.io
# consumers — they were only published as collateral so `shore-daemon` could
# publish (cargo forces a publishable crate's path-deps to be publishable).
#
# `git_only = true` takes them off crates.io entirely: release-plz skips
# `cargo publish` and baselines each version off its `{{ package }}-v{{ version }}`
# git tag instead of the registry. `semver_check = false` stops cargo-semver-checks
# from flagging every refactor of an incidentally-`pub` lib item as a breaking
# change (the cause of the runaway major bumps). `release = true` is kept so
# the git tags + CHANGELOG still publish — the Arch workflow (package.yml)
# gates on `shore-daemon-v*` / `shore-cli-v*` tags.

[[package]]
name = "shore-llm"
release = true
git_only = true
semver_check = false

[[package]]
name = "shore-ledger"
release = true
git_only = true
semver_check = false

[[package]]
name = "shore-swp-server"
release = true
git_only = true
semver_check = false

[[package]]
name = "shore-daemon"
release = true
git_only = true
semver_check = false

[[package]]
name = "shore-cli"
publish = true
release = true

# --- Non-released crates ----------------------------------------------------

[[package]]
name = "shore-test-harness"
publish = false
release = false
