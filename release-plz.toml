[workspace]
# All released workspace members publish to crates.io and get a per-crate
# GitHub release + CHANGELOG.md entry. Each crate's tag is the default
# `{{ package }}-v{{ version }}` (e.g., `shore-daemon-v1.8.5`).
#
# The Arch packaging workflow (.github/workflows/package.yml) gates on
# `shore-daemon-v*` and `shore-cli-v*` tags specifically, so each binary
# ships its own Arch package independently.
git_release_enable = true
changelog_update = true

# --- Core libraries ---------------------------------------------------------

[[package]]
name = "shore-protocol"
publish = true
release = true

[[package]]
name = "shore-config"
publish = true
release = true

[[package]]
name = "shore-swp-client"
publish = true
release = true

[[package]]
name = "shore-diagnostics"
publish = true
release = true

# --- Binary-side crates -----------------------------------------------------
# Each carries its own explicit version in Cargo.toml (no workspace
# inheritance). release-plz computes per-crate bumps from conventional
# commits against each crate's last `{{ package }}-v{{ version }}` tag and
# the crates.io registry.

[[package]]
name = "shore-llm"
publish = true
release = true

[[package]]
name = "shore-ledger"
publish = true
release = true

[[package]]
name = "shore-swp-server"
publish = true
release = true

[[package]]
name = "shore-daemon"
publish = true
release = true

[[package]]
name = "shore-cli"
publish = true
release = true

# --- Non-released crates ----------------------------------------------------

[[package]]
name = "shore-test-harness"
publish = false
release = false
