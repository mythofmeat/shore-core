[workspace]
# Only library crates publish to crates.io. Binary crates (shore-daemon,
# shore-cli) and the integration test harness ship via Arch packaging and
# `cargo install`, not crates.io.
git_release_enable = true
changelog_update = true

# --- Library crates that publish to crates.io -------------------------------
# Each library tracks its own version; release-plz computes bumps from
# conventional commits on a per-crate basis.

[[package]]
name = "shore-protocol"
publish = true
release = true

[[package]]
name = "shore-config"
publish = true
release = true

[[package]]
name = "shore-swp-client"
publish = true
release = true

[[package]]
name = "shore-diagnostics"
publish = true
release = true

# --- Binary-side workspace members ------------------------------------------
# shore-daemon, shore-cli, shore-llm, shore-ledger, and shore-swp-server all
# share `[workspace.package].version` via `version.workspace = true`. They
# ship together as one Arch package (shore-core).
#
# All five are marked release = true so release-plz sees commits touching any
# of their files and computes bumps. Because they share the workspace version
# line, any bump lands on `[workspace.package].version` — which advances all
# five crates at once.
#
# Each crate still gets its own git tag (release-plz uses per-crate tags as
# the "last release" reference for computing bumps; without them, bumps come
# out empty — observed concretely in the 2026-05-21 release-plz run that
# returned `{"prs":[]}` despite an unreleased fix(ledger) commit). The four
# non-anchor crates therefore keep the default `{{ package }}-v{{ version }}`
# tag template; only shore-daemon's tag is `v{{ version }}`, which is what
# .github/workflows/package.yml listens for to build and publish the Arch
# package. git-cliff (invoked from that workflow) owns the GitHub release
# notes on `v*`, so release-plz's per-crate GitHub releases and CHANGELOGs
# are suppressed across the binary side.

[[package]]
name = "shore-daemon"
publish = false
release = true
git_tag_name = "v{{ version }}"
git_release_enable = false
changelog_update = false

[[package]]
name = "shore-cli"
publish = false
release = true
git_release_enable = false
changelog_update = false

[[package]]
name = "shore-llm"
publish = false
release = true
git_release_enable = false
changelog_update = false

[[package]]
name = "shore-ledger"
publish = false
release = true
git_release_enable = false
changelog_update = false

[[package]]
name = "shore-swp-server"
publish = false
release = true
git_release_enable = false
changelog_update = false

# --- Truly non-released crates ----------------------------------------------

[[package]]
name = "shore-test-harness"
publish = false
release = false
