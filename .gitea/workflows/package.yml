name: Build and publish Arch packages

on:
  push:
    tags: ['v*']

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is on main
        run: |
          git fetch origin main
          git merge-base --is-ancestor HEAD origin/main || \
            { echo "::error::Tag is not on main — skipping build"; exit 1; }

      - name: Pin PKGBUILD source to tag
        working-directory: contrib
        run: |
          TAG="${{ github.ref_name }}"
          sed -i "s|silvershore.git\"|silvershore.git#tag=${TAG}\"|" PKGBUILD

      - name: Build packages
        working-directory: contrib
        run: makepkg -sf --noconfirm

      - name: Upload to Gitea package registry
        working-directory: contrib
        run: |
          for pkg in *.pkg.tar.zst; do
            [ -f "$pkg" ] || continue
            echo "Uploading $pkg..."
            curl --fail --user "eshen:${{ secrets.PACKAGE_TOKEN }}" \
                 --upload-file "$pkg" \
                 "${{ gitea.server_url }}/api/packages/eshen/arch/eshen"
          done
