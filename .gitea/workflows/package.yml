name: Build and publish Arch package

on:
  push:
    branches: [main]

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for pkgver()

      - name: Build package
        working-directory: contrib
        run: makepkg -sf --noconfirm

      - name: Upload to Gitea package registry
        working-directory: contrib
        run: |
          ls -la *.pkg.tar.zst 2>/dev/null || echo "No packages in contrib/, checking PKGDEST..."
          pkg=$(find . /home -maxdepth 3 -name '*.pkg.tar.zst' -newer PKGBUILD 2>/dev/null | head -1)
          if [ -z "$pkg" ]; then
            echo "ERROR: No .pkg.tar.zst found anywhere"
            exit 1
          fi
          echo "Uploading $pkg..."
          curl --fail --user "eshen:${{ secrets.PACKAGE_TOKEN }}" \
               --upload-file "$pkg" \
               "${{ gitea.server_url }}/api/packages/eshen/arch/eshen"
