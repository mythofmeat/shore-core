# cargo-deny configuration — supply-chain and dependency hygiene.
# Run: cargo deny check
# Docs: https://embarkstudios.github.io/cargo-deny/

[advisories]
# RUSTSEC advisory database. Vulnerabilities, yanked crates, and unmaintained
# crate advisories fail the check.
version = 2
yanked = "deny"
unmaintained = "all"

[licenses]
version = 2
# The workspace is dual MIT OR Apache-2.0; only allow licenses compatible with
# redistributing under those terms. Extend deliberately, not reflexively.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
]
confidence-threshold = 0.9

[bans]
# Duplicate versions of the same crate bloat the tree and the binary. Warn for
# now (transitive dups are common); tighten to "deny" once the tree is clean.
multiple-versions = "warn"
# The dev-only shore-test-harness workspace dependency is intentionally
# path-only to avoid a versioned package cycle with shore-daemon.
wildcards = "allow"

[sources]
# Only crates.io and the project's own git repos are acceptable sources.
unknown-registry = "deny"
unknown-git = "deny"
