[workspace]
resolver = "2"
members = [
    "shore-protocol",
    "shore-client",
    "shore-diagnostics",
    "shore-config",
    "shore-llm-client",
    "shore-daemon",
    "shore-daemon-server",
    "shore-cli",
    "shore-mcp",
    "shore-tui",
    "shore-ledger",
    "shore-test-harness",
    # "shore-matrix",  # disabled: matrix-sdk 0.16.0 hits recursion_limit on rustc 1.94+
]

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1", features = ["preserve_order"] }
toml = "0.8"
thiserror = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["json", "env-filter"] }
dirs = "6"
dotenvy = "0.15"
tokio = { version = "1", features = ["full"] }
chrono = "0.4"
libc = "0.2"
tempfile = "3"
reqwest = { version = "0.12", features = ["json", "stream"] }
dashmap = "6"
futures-util = "0.3"
shore-protocol = { path = "shore-protocol" }
shore-config = { path = "shore-config" }
shore-diagnostics = { path = "shore-diagnostics" }
shore-llm-client = { path = "shore-llm-client" }
shore-ledger = { path = "shore-ledger" }
rusqlite = { version = "0.37", features = ["bundled"] }
