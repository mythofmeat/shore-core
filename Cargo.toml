[workspace]
resolver = "2"
members = [
    "core/protocol",
    "core/config",
    "core/swp-client",
    "backend/diagnostics",
    "backend/llm",
    "backend/ledger",
    "backend/swp-server",
    "backend/daemon",
    "clients/cli",
    "dev/test-harness",
]
default-members = [
    "core/protocol",
    "core/config",
    "core/swp-client",
    "backend/daemon",
    "clients/cli",
]

[workspace.package]
version = "1.8.4"
edition = "2021"
license = "MIT OR Apache-2.0"
repository = "https://github.com/mythofmeat/shore-core"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1", features = ["preserve_order"] }
toml = "0.8"
thiserror = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["json", "env-filter"] }
dirs = "6"
dotenvy = "0.15"
tokio = { version = "1", features = ["full"] }
chrono = "0.4"
libc = "0.2"
tempfile = "3"
uuid = { version = "1", features = ["v4"] }
which = "6"
axum = "0.7"
tower = "0.5"
reqwest = { version = "0.12", features = ["json", "stream"] }
dashmap = "6"
futures-util = "0.3"
async-trait = "0.1"
# `version` is required alongside `path` for `cargo package` to succeed
# (cargo refuses path-only deps when packaging, even when publish is
# disabled). Versions here track what is published on crates.io for the
# core library crates so packaged manifests stay coherent.
shore-protocol = { path = "core/protocol", version = "0.1.0" }
shore-config = { path = "core/config", version = "0.1.0" }
shore-swp-client = { path = "core/swp-client", version = "0.1.0" }
shore-diagnostics = { path = "backend/diagnostics", version = "0.1.1" }
shore-llm = { path = "backend/llm", version = "1.8.4" }
shore-ledger = { path = "backend/ledger", version = "1.8.4" }
shore-swp-server = { path = "backend/swp-server", version = "1.8.4" }
shore-daemon = { path = "backend/daemon", version = "1.8.4" }
# Intentionally path-only (no `version`). shore-test-harness is a dev-only
# crate that shore-daemon pulls in as a dev-dependency, and it depends
# back on shore-daemon — a versioned cycle there causes
# `cargo package --workspace` to silently skip shore-daemon (and several
# other crates). Path-only dev-deps are stripped from packaged manifests
# entirely, so the cycle vanishes for packaging while tests still link
# against the harness via the path.
shore-test-harness = { path = "dev/test-harness" }
rusqlite = { version = "0.37", features = ["bundled"] }

[profile.dev]
debug = "line-tables-only"

[profile.test]
debug = "line-tables-only"
