[workspace]
resolver = "2"
members = [
    "shore-protocol",
    "shore-client",
    "shore-diagnostics",
    "shore-config",
    "shore-llm-client",
    "shore-daemon",
    "shore-daemon-server",
    "shore-cli",
    "shore-mcp",
    "shore-tui",
    "shore-ledger",
    "shore-test-harness",
    "shore-matrix",
]

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1", features = ["preserve_order"] }
toml = "0.8"
thiserror = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["json", "env-filter"] }
dirs = "6"
dotenvy = "0.15"
tokio = { version = "1", features = ["full"] }
chrono = "0.4"
libc = "0.2"
tempfile = "3"
which = "6"
reqwest = { version = "0.12", features = ["json", "stream"] }
dashmap = "6"
futures-util = "0.3"
shore-protocol = { path = "shore-protocol" }
shore-config = { path = "shore-config" }
shore-diagnostics = { path = "shore-diagnostics" }
shore-llm-client = { path = "shore-llm-client" }
shore-ledger = { path = "shore-ledger" }
rusqlite = { version = "0.37", features = ["bundled"] }

[profile.dev]
debug = "line-tables-only"

[profile.test]
debug = "line-tables-only"

# Pinned to an eshen-gitea fork of matrix-rust-sdk that adds
# `#![recursion_limit = "512"]` to crates/matrix-sdk/src/lib.rs.
# rustc 1.94+ hits "queries overflow the depth limit" computing
# the layout of matrix-sdk::Client::sync()'s async fn body on the
# published 0.16.0. Upstream tracking: matrix-org/matrix-rust-sdk#6254.
# Drop this patch once upstream ships a fix (expected post-0.16).
[patch.crates-io]
matrix-sdk = { git = "http://localhost:3000/eshen/matrix-rust-sdk.git", rev = "8285d1ca5da1f18227ba4eddaeef9bf579a55de6" }
