[workspace]
resolver = "2"
members = [
    "core/protocol",
    "core/config",
    "core/swp-client",
    "backend/diagnostics",
    "backend/llm",
    "backend/ledger",
    "backend/swp-server",
    "backend/daemon",
    "clients/cli",
    "clients/tui",
    "clients/gui/src-tauri",
    "bridges/matrix",
    "dev/mcp",
    "dev/test-harness",
]
default-members = [
    "core/protocol",
    "core/config",
    "core/swp-client",
    "backend/daemon",
    "clients/cli",
]

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1", features = ["preserve_order"] }
toml = "0.8"
thiserror = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["json", "env-filter"] }
dirs = "6"
dotenvy = "0.15"
tokio = { version = "1", features = ["full"] }
chrono = "0.4"
libc = "0.2"
tempfile = "3"
uuid = { version = "1", features = ["v4"] }
which = "6"
axum = "0.7"
tower = "0.5"
reqwest = { version = "0.12", features = ["json", "stream"] }
dashmap = "6"
futures-util = "0.3"
async-trait = "0.1"
shore-protocol = { path = "core/protocol" }
shore-config = { path = "core/config" }
shore-swp-client = { path = "core/swp-client" }
shore-diagnostics = { path = "backend/diagnostics" }
shore-llm = { path = "backend/llm" }
shore-ledger = { path = "backend/ledger" }
shore-swp-server = { path = "backend/swp-server" }
shore-daemon = { path = "backend/daemon" }
shore-test-harness = { path = "dev/test-harness" }
rusqlite = { version = "0.37", features = ["bundled"] }

[profile.dev]
debug = "line-tables-only"

[profile.test]
debug = "line-tables-only"

# Pinned to a fork of matrix-rust-sdk that adds
# `#![recursion_limit = "512"]` to crates/matrix-sdk/src/lib.rs.
# rustc 1.94+ hits "queries overflow the depth limit" computing
# the layout of matrix-sdk::Client::sync()'s async fn body on the
# published 0.16.0. Upstream tracking: matrix-org/matrix-rust-sdk#6254.
# Drop this patch once upstream ships a fix (expected post-0.16).
[patch.crates-io]
matrix-sdk = { git = "https://github.com/mythofmeat/matrix-rust-sdk.git", rev = "8285d1ca5da1f18227ba4eddaeef9bf579a55de6" }
