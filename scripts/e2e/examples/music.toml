# e2e example: the `ask_music` sub-agent (MCP listening-stats + web tools).
#
# Used by scripts/e2e/daemon.sh to verify the music agent end-to-end against the
# real mcp-listening-stats server, isolated from the live daemon:
#
#   scripts/e2e/daemon.sh up --name music \
#       --config    scripts/e2e/examples/music.toml \
#       --character scripts/e2e/examples/music-soul.md
#   scripts/e2e/daemon.sh send --name music \
#       "What have I played most this month, and what do critics say about it?"
#   scripts/e2e/daemon.sh exec --name music -- log     # inspect tool calls
#   scripts/e2e/daemon.sh down --name music
#
# The primary chat model + [daemon].addr + autonomy-off are injected by the harness
# (conf.d/_e2e_override.toml); provider keys come from the copied ~/.config/shore/.env.
# Adjust the mcp cwd if your checkout lives elsewhere.

[defaults]
display_name   = "e2e-music"
subagent_model = "opencode-go:glm-5.2"

[tools]
enabled_tools     = ["read", "search", "list_files", "check_time"]
enabled_subagents = ["music"]

[tools.web_search]
api_key_env   = "TAVILY_API_KEY"
result_limit  = 10
search_depth  = "advanced"
include_answer = true

[subagents.music]
description = "Delegate a question about the user's music collection or listening history to an agent who queries it and returns a writeup."
prompt = "You research the user's music using two local sources that join on MusicBrainz id: beets (the local collection — tags, ratings, formats) and ListenBrainz (listening over time — what was played, when). Call beets_schema first if you're unsure which fields exist. Domain rules: ratings are 0-5 (rating:5 is top); ignore play_count, it's dead data — the real local signals are play_time (seconds) and last_played; query last_played with date strings like last_played:2025-01-01.. ; genres is multi-valued (use genres, not genre). You also have web_search and fetch_url: use them for reviews, critical reception, album background, and recommendations beyond the collection. Lead with what the local data shows, then enrich with the web; keep local and external signals distinct and cite URLs for web claims. Return a concise writeup with concrete numbers."
tools = ["mcp__listening_stats__*", "web_search", "fetch_url"]

[mcp.listening_stats]
command = "uv"
args    = ["run", "mcp-listening-stats"]
cwd     = "/home/eshen/.local/opt/mcp/mcp-listening-stats"
